{% extends 'base.html' %}
{% block title %}Ingresar — GlitchGirls{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="container">
    <div class="auth-card">
      <div class="auth-logo">⬡ GLITCHGIRLS</div>
      <div class="auth-subtitle">INICIAR SESIÓN</div>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" name="email" class="form-control"
                 placeholder="tu@correo.com" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" class="form-control"
                 placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-2">
          <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
        </button>
      </form>

      <hr class="auth-divider">
      <p class="text-center mb-0" style="color:var(--text-muted);font-size:0.88rem;">
        ¿No tienes cuenta?
        <a href="{{ url_for('register') }}" style="color:var(--accent);">Regístrate gratis</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
